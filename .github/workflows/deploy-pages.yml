name: Deploy projects to GitHub Pages

on:
  push:
    branches:
      - blazor-final-pages
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build Blazor application
        run: >
          dotnet publish
          04-Blazor_for_Fron-End_Development/5-Final_Project/5-Final_Project.csproj
          --configuration Release
          --output "$RUNNER_TEMP/eventease"

      - name: Assemble site
        env:
          SITE_DIR: ${{ runner.temp }}/site
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          mkdir -p "$SITE_DIR/portfolio" "$SITE_DIR/eventease"
          cp deployment/index.html "$SITE_DIR/index.html"
          cp -R 03-Inroduction_to_Web_Development/5-Using_Copilot_for_Writing_HTML_CSS_and_JavaScript/. "$SITE_DIR/portfolio/"
          cp -R "$RUNNER_TEMP/eventease/wwwroot/." "$SITE_DIR/eventease/"
          sed -i "s|<base href=\"/\" />|<base href=\"${BASE_PATH}/eventease/\" />|" "$SITE_DIR/eventease/index.html"
          touch "$SITE_DIR/.nojekyll"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/site

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
